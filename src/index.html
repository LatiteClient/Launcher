<!DOCTYPE html>

<head>

	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body class="preventSelect">
	<div class="launcher">
		<img loading="lazy" src="./img/background.png" id="background" />
		<div id="header" data-tauri-drag-region>
			<div id="brand">
				<img loading="lazy" src="./img/latite.png" id="logoImg" />
				<div id="name">Latite Client</div>
			</div>
			<img loading="lazy" src="./img/close.svg" class="close"
				onclick="closeWindowAnimation(); closeWindowTimeout();" />
		</div>
		<div class="center" data-tauri-drag-region>
			<div id="launchButton">
				<div id="centerLaunch">
					<div id="launchText">LAUNCH</div>
					<div id="launchSubtext">Status: Idle</div>
				</div>
			</div>
			<p class="preventSelect">
				Right click the launch button to inject custom DLLs
			</p>

            <div id="selectButton">

              <li class="option">

            </ul>

		<div id="misc">
			<img loading="lazy" src="./img/discord.svg" id="discord"
				onclick="window.open('https://discord.gg/latiteclient/');" />
			<div id="infobar">
				<div class="info">Changelog</div>
				<div class="info">Credits</div>
				<img loading="lazy" src="img/settings.svg" id="settings" />
			</div>
		</div>
	</div>
</body>

<script>
	function closeWindowAnimation() {
		var launcher = document.querySelector(".launcher");
		launcher.classList.toggle("launcherCloseAnimation");
	}

	let timeout;

	function closeWindowTimeout() {
		timeout = setTimeout(closeWindow, 500);
	}

	function closeWindow() {
		window.close();
	}

	document.addEventListener("contextmenu", (event) => event.preventDefault());
</script>

</html>
