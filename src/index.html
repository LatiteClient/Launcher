<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="./css/styling.css" />
	<script src="./js/app.js"></script>
	<title>Latite V2 Injector</title>
</head>

<body class="preventSelect">
	<div class="launcher">
		<img loading="lazy" src="./img/background.png" class="background" />

		<div class="header" data-tauri-drag-region>
			<div class="brand">
				<img loading="lazy" src="./img/latite.png" class="logoImg" />
				<div class="name">Latite Client</div>
			</div>
			<img loading="lazy" src="./img/close.svg" class="close"
				onclick="closeWindowAnimation(); closeWindowTimeout();" />
		</div>
		<div class="settingsheader" data-tauri-drag-region>
			<div class="brand">
				<img loading="lazy" src="./img/latite.png" class="logoImg" />
				<div class="name">Settings</div>
			</div>
			<img loading="lazy" src="./img/arrowback.svg" class="close" onclick="returnToHome()" />
		</div>

		<div class="center hide" data-tauri-drag-region>
			<div id="launchButton">
				<div id="centerLaunch">
					<div id="launchText">LAUNCH</div>
					<div id="launchSubtext">Status: Idle</div>
				</div>
			</div>
			<p class="preventSelect">
				Right click the launch button to inject custom DLLs
			</p>
			<!--
          <div id="selectMenu">
            <div id="selectButton">
              <span id="selectVersion">Select a version</span>
              <img id="downArrow" src="./img/down.svg" />
            </div>
            <ul class="options">
              <li class="option">
                <span class="optionText">Version 1.20.30</span>
              </li>
              <li class="option">
                <span class="optionText">Version 1.20.40</span>
              </li>
              <li class="option">
                <span class="optionText">Version 1.20.50</span>
              </li>
            </ul>
          </div>
        -->
		</div>
		<div class="centersettings" data-tauri-drag-region>
			<div class="settingsection">
				<h2>Discord RPC</h2>
				<div class="settingoption">
					<p>Discord Rich Presence</p>
					<input type="checkbox">
				</div>
				<div class="settingoption">
					<p>Show server in RPC</p>
					<input type="checkbox">
				</div>
				<div class="settingoption">
					<p>Show Minecraft Version in RPC</p>
					<input type="checkbox">
				</div>
				<div class="settingoption">
					<p>Show time played in RPC</p>
					<input type="checkbox">
				</div>
			</div>
			<div class="settingsection">
				<h2>Miscellaneous</h2>
				<div class="settingoption">
					<p>Hide to system tray on close</p>
					<input type="checkbox" checked>
				</div>
				<div class="settingoption">
					<p>Close after Injected</p>
					<input type="checkbox">
				</div>
			</div>
		</div>
		<div id="misc" class="hide">
			<img loading="lazy" src="./img/discord.svg" id="discord"
				onclick="window.open('https://discord.com/invite/latite');" />
			<div id="infobar">
				<div class="info">Changelog</div>
				<div class="info">Credits</div>
				<img loading="lazy" src="img/settings.svg" id="settings" onclick="hide();" />
			</div>
		</div>
	</div>
</body>

<script>

	function hide() {
		var hide = document.querySelectorAll(".hide");
		var settingsPage = document.querySelector(".centersettings");
		var settingsHeader = document.querySelector(".settingsheader");
		var header = document.querySelector(".header");

		hide.forEach((hide) => hide.style.display = "none");
		settingsPage.style.display = "flex";
		settingsHeader.style.display = "flex";
		header.style.display = "none";
	}

	function returnToHome() {
		var hide = document.querySelectorAll(".hide");
		var settingsPage = document.querySelector(".centersettings");
		var settingsHeader = document.querySelector(".settingsheader");
		var header = document.querySelector(".header");

		hide.forEach((hide) => hide.style.display = "flex");
		settingsPage.style.display = "none";
		settingsHeader.style.display = "none";
		header.style.display = "flex";
	}

	function closeWindowAnimation() {
		var launcher = document.querySelector(".launcher");
		launcher.classList.toggle("launcherCloseAnimation");
	}

	let timeout;

	function closeWindowTimeout() {
		timeout = setTimeout(closeWindow, 300);
	}

	function closeWindow() {
		window.close();
	}

	document.addEventListener("contextmenu", (event) => event.preventDefault());

</script>

</html>
