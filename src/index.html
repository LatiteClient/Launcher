<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="./css/styling.css" />
	<title>Latite V2 Injector</title>
</head>

<body class="preventSelect">
	<div class="launcher">
		<img loading="lazy" src="./img/background.png" class="background" />

		<div class="page home">
			<div class="header" data-tauri-drag-region>
				<div class="brand">
					<img loading="lazy" src="./img/latite.png" class="logoImg" />
					<div class="name">Latite Client</div>
				</div>
				<img loading="lazy" src="./img/close.svg" class="close"
					onclick="closeWindowAnimation(); closeWindowTimeout();" />
			</div>

			<div class="center" data-tauri-drag-region>
				<div id="launchButton">
					<div id="centerLaunch">
						<div id="launchText">LAUNCH</div>
						<div id="launchSubtext">Status: Idle</div>
					</div>
				</div>
				<p class="preventSelect">
					Right click the launch button to inject custom DLLs
				</p>
			</div>

			<div id="misc">
				<div id="infobar">
					<div class="info">Changelog</div>
					<div class="info">Credits</div>
				</div>

				<div id="iconbar">
					<img loading="lazy" src="./img/discord.svg" id="discord"
						onclick="window.open('https://discord.com/invite/latite')" />
					<img loading="lazy" src="./img/settings.svg" id="settings" onclick="openSettings()" />
				</div>
			</div>
		</div>

		<div class="page settings">
			<div class="settingsheader" data-tauri-drag-region>
				<div class="brand">
					<img loading="lazy" src="./img/latite.png" class="logoImg" />
					<div class="name">Settings</div>
				</div>
				<img loading="lazy" src="./img/arrowback.svg" class="close" onclick="returnToHome()" />
			</div>

			<div class="centersettings">
				<div class="settingsection">
					<h2>Discord RPC</h2>
					<div class="settingoption">
						<p>Discord Rich Presence</p>
						<input class="options_input" type="checkbox" id="rpc_enabled" />
					</div>
					<div class="settingoption">
						<p>Show server in RPC</p>
						<input class="options_input" type="checkbox" id="rpc_show_server" />
					</div>
					<div class="settingoption">
						<p>Show Minecraft Version in RPC</p>
						<input class="options_input" type="checkbox" id="rpc_show_mc_version" />
					</div>
					<div class="settingoption">
						<p>Show time played in RPC</p>
						<input class="options_input" type="checkbox" id="rpc_show_time_played" />
					</div>
				</div>

				<div class="settingsection">
					<h2>Miscellaneous</h2>
					<div class="settingoption">
						<p>Hide to system tray on close</p>
						<input class="options_input" type="checkbox" id="misc_hide_on_close" />
					</div>
					<div class="settingoption">
						<p>Close after Injected</p>
						<input class="options_input" type="checkbox" id="misc_close_after_injected" />
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="./main.js" type="module"></script>
	<script>
		function openSettings() {
			const homePage = document.querySelector(".page.home");
			const settingsPage = document.querySelector(".page.settings");

			homePage.classList.add("hidden");
			settingsPage.classList.add("active");
		}

		function returnToHome() {
			const homePage = document.querySelector(".page.home");
			const settingsPage = document.querySelector(".page.settings");

			settingsPage.classList.remove("active");
			homePage.classList.remove("hidden");
		}

		function closeWindowAnimation() {
			const launcher = document.querySelector(".launcher");
			launcher.classList.add("launcherCloseAnimation");
		}

		let timeout;

		function closeWindowTimeout() {
			timeout = setTimeout(closeWindow, 300);
		}

		function closeWindow() {
			window.close();
		}

		document.addEventListener("contextmenu", (event) => event.preventDefault());
	</script>
</body>

</html>
